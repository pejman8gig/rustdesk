name: Cross Compile Remotik for Windows

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: ubuntu-latest  # <-- روی لینوکس می‌سازیمش
    
    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 1

      - name: Install dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake pkg-config \
            libxcb-shape0-dev libxcb-xfixes0-dev \
            libxcb-randr0-dev libgtk-3-dev libpam0g-dev \
            libpulse-dev libasound2-dev libxdo-dev libxfixes-dev \
            libopus-dev libvpx-dev libyuv-dev

      - name: Setup Rust (with Windows target)
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: x86_64-pc-windows-gnu  # <-- هدف: ویندوز
          profile: minimal
          override: true

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cross-${{ hashFiles('**/Cargo.lock') }}

      - name: Build for Windows
        run: |
          # حذف --locked از build.py
          sed -i 's/--locked//g' build.py
          
          # ساخت با target ویندوز
          cargo build --target x86_64-pc-windows-gnu --release --features flutter

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Remotik-Windows-cross
          path: target/x86_64-pc-windows-gnu/release/rustdesk.exe
