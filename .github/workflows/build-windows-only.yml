name: Custom Windows Build (Remotik)

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 1

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build RustDesk Client
        run: |
          # حذف --locked از فایل build.py
          (Get-Content build.py) -replace '--locked', '' | Set-Content build.py
          # کامپایل بدون hwcodec
          python3 build.py --portable --flutter

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Remotik-Windows
          path: target/release/rustdesk.exe
